<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Bean — Jack's Coffee Beans</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="brand">
      <span class="brand-icon" aria-hidden="true">&#9749;</span>
      <span class="brand-name">Jack's Coffee Beans</span>
    </a>
    <nav class="topnav">
      <a class="pill" id="backLink" href="index.html">Beans</a>
      <a class="pill pill-active" href="#">+ Add</a>
      <span id="authBox" class="auth-box"></span>
    </nav>
  </header>

  <main class="content">
    <h1 class="page-title" id="pageTitle">Add Bean</h1>

    <div id="authGate" class="auth-gate" hidden>
      <p>Set a display name to add beans.</p>
      <button type="button" class="btn btn-primary" id="gateLoginBtn">Set your name</button>
    </div>

    <form id="beanForm" class="form" novalidate hidden>
      <label class="field">
        <span class="field-label">Name</span>
        <input type="text" name="name" id="name" required placeholder="Ethiopia Yirgacheffe" />
      </label>

      <label class="field">
        <span class="field-label">Roaster</span>
        <input type="text" name="roaster" id="roaster" placeholder="Blue Bottle" />
      </label>

      <div class="field">
        <span class="field-label">Rating</span>
        <div class="rating-input" id="ratingInput" role="radiogroup" aria-label="Rating">
          <button type="button" class="star-btn" data-value="1" aria-label="1 star">&#9733;</button>
          <button type="button" class="star-btn" data-value="2" aria-label="2 stars">&#9733;</button>
          <button type="button" class="star-btn" data-value="3" aria-label="3 stars">&#9733;</button>
          <button type="button" class="star-btn" data-value="4" aria-label="4 stars">&#9733;</button>
          <button type="button" class="star-btn" data-value="5" aria-label="5 stars">&#9733;</button>
          <input type="hidden" name="rating" id="rating" value="0" />
        </div>
      </div>

      <label class="field">
        <span class="field-label">Roast type</span>
        <select name="roastType" id="roastType">
          <option value="">Select roast type</option>
          <option value="Light">Light</option>
          <option value="Medium-Light">Medium-Light</option>
          <option value="Medium">Medium</option>
          <option value="Medium-Dark">Medium-Dark</option>
          <option value="Dark">Dark</option>
          <option value="French">French</option>
          <option value="Italian">Italian</option>
        </select>
      </label>

      <label class="field">
        <span class="field-label">Notes</span>
        <textarea name="notes" id="notes" rows="4" placeholder="Tasting notes, brew method, anything memorable..."></textarea>
      </label>

      <label class="checkbox-field">
        <input type="checkbox" name="favorite" id="favorite" />
        <span>Mark as favorite</span>
      </label>

      <div class="form-actions">
        <a class="btn btn-secondary" id="cancelLink" href="index.html">Cancel</a>
        <button type="button" class="btn btn-danger" id="deleteBtn" hidden>Delete</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>initEditPage();</script>
</body>
</html>
