<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jack's Coffee Beans</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#b87333" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Coffee Beans" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="brand">
      <span class="brand-icon" aria-hidden="true">&#9749;</span>
      <span class="brand-name">Jack's Coffee Beans</span>
    </a>
    <nav class="topnav">
      <button class="pill pill-active" type="button">Beans</button>
      <a class="pill" id="addLink" href="edit.html">+ Add</a>
      <button class="pill" type="button" id="shareBtn">Share</button>
      <span id="authBox" class="auth-box"></span>
    </nav>
  </header>

  <main class="content">
    <p class="collection-label" id="collectionLabel" hidden></p>
    <p class="count" id="count">0 BEANS</p>
    <div class="coffee-loader" id="loading" hidden aria-live="polite" aria-label="Loading beans">
      <div class="coffee-cup-wrap">
        <div class="coffee-steam" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <div class="coffee-cup">
          <div class="coffee-fill"></div>
        </div>
      </div>
      <p class="loading-text">Brewing your beans</p>
    </div>
    <ul class="bean-list" id="beanList"></ul>
    <div class="empty" id="empty" hidden>
      <p id="emptyMessage">No beans yet. Tap the + button to add your first.</p>
    </div>
  </main>

  <a class="fab" id="addFab" href="edit.html" aria-label="Add bean">
    <span aria-hidden="true">+</span>
  </a>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>renderList();</script>
</body>
</html>
